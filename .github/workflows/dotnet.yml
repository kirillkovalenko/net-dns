# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test (net8.0, net9.0, net10.0)
      run: dotnet test --no-build --verbosity normal --framework net8.0 && dotnet test --no-build --verbosity normal --framework net9.0 && dotnet test --no-build --verbosity normal --framework net10.0

  build-windows:
    name: Build & Test (Windows — net462, net481)
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test (net462)
      run: dotnet test --no-build --verbosity normal --framework net462
    - name: Test (net481)
      run: dotnet test --no-build --verbosity normal --framework net481

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ build-linux, build-windows ]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Pack
      run: dotnet pack src --no-restore -c Release -o ./artifacts
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@v1
      id: login
    - name: Push package
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
    - name: Push symbols
      run: dotnet nuget push ./artifacts/*.snupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
